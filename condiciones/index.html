<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini‑Ejercicios Condicionales JS‑1</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef3f8;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    section {
        background: white;
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
        padding: 10px 20px;
        background: #0077cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #005fa3;
    }

    .resultado {
        margin-top: 15px;
        font-weight: bold;
        white-space: pre-line;
    }
</style>
</head>

<body>

<h1>Mini‑Ejercicios Condicionales JS‑1</h1>

<!-- EJERCICIO 1 -->
<section>
    <h2>1. Entrada discoteca</h2>
    <button onclick="discoteca()">Comprobar edad</button>
    <div id="res1" class="resultado"></div>
</section>

<!-- EJERCICIO 2 -->
<section>
    <h2>2. Cinco colores</h2>
    <button onclick="colores()">Elegir color</button>
    <div id="res2" class="resultado"></div>
</section>

<!-- EJERCICIO 3 -->
<section>
    <h2>3. Lámpara no enciende</h2>
    <button onclick="lampara()">Diagnóstico</button>
    <div id="res3" class="resultado"></div>
</section>

<script>
/* ---------------- EJERCICIO 1 ---------------- */

function discoteca() {
    let edad = parseInt(prompt("¿Qué edad tienes?"));

    let mensaje = "";

    if (edad > 18) {
        mensaje = "Puedes pasar. Bienvenido a la discoteca.";
    } else if (edad < 18) {
        mensaje = "No puedes pasar. Eres menor de edad.";
    } else {
        mensaje = "Tienes exactamente 18 años. Puedes pasar.";
    }

    document.getElementById("res1").innerText = mensaje;
}


/* ---------------- EJERCICIO 2 ---------------- */

function colores() {
    let color = prompt("Elige un color: azul, verde, rojo, amarillo o violeta").toLowerCase();

    let mensaje = "";

    switch (color) {
        case "azul":
            mensaje = "El azul es como el mar en un día despejado.";
            break;
        case "verde":
            mensaje = "El verde es el color de la naturaleza y la calma.";
            break;
        case "rojo":
            mensaje = "El rojo es pasión, energía y fuerza.";
            break;
        case "amarillo":
            mensaje = "El amarillo es alegría, luz y verano.";
            break;
        case "violeta":
            mensaje = "El violeta es misterio, creatividad y magia.";
            break;
        default:
            mensaje = "Ese color no está en la lista, pero seguro que también es bonito.";
    }

    document.getElementById("res2").innerText = mensaje;
}


/* ---------------- EJERCICIO 3 ---------------- */

function lampara() {
    let mensaje = "";

    let enchufada = prompt("¿La lámpara está enchufada? (si/no)").toLowerCase();

    if (enchufada === "si") {
        let bombilla = prompt("¿La bombilla está quemada? (si/no)").toLowerCase();

        if (bombilla === "si") {
            mensaje = "Cambia la bombilla.";
        } else {
            mensaje = "La lámpara está averiada.";
        }

    } else {
        mensaje = "Enchufa la lámpara.";
    }

    document.getElementById("res3").innerText = mensaje;
}
</script>

</body>
</html>
