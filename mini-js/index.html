<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini‑Ejercicios JS‑1</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #eef3f8;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
    }

    section {
        background: white;
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    button {
        padding: 10px 20px;
        background: #0077cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #005fa3;
    }

    .resultado {
        margin-top: 15px;
        font-weight: bold;
        white-space: pre-line;
    }
</style>
</head>

<body>

<h1>Mini‑Ejercicios JS‑1</h1>

<!-- EJERCICIO 1 -->
<section>
    <h2>1. Resta de dos números</h2>
    <button onclick="restar()">Pedir números y restar</button>
    <div id="res1" class="resultado"></div>
</section>

<!-- EJERCICIO 2 -->
<section>
    <h2>2. Frase con nombre, localidad y hobby</h2>
    <button onclick="fraseUsuario()">Pedir datos</button>
    <div id="res2" class="resultado"></div>
</section>

<!-- EJERCICIO 3 -->
<section>
    <h2>3. Área de un círculo</h2>
    <button onclick="areaCirculo()">Calcular área</button>
    <div id="res3" class="resultado"></div>
</section>

<!-- EJERCICIO 4 -->
<section>
    <h2>4. Tienda de ropa</h2>
    <button onclick="tiendaRopa()">Calcular total</button>
    <div id="res4" class="resultado"></div>
</section>

<script>
/* ---------------- EJERCICIO 1 ---------------- */

function restar() {
    let n1 = parseFloat(prompt("Introduce el primer número:"));
    let n2 = parseFloat(prompt("Introduce el segundo número:"));

    let resultado = n1 - n2;

    document.getElementById("res1").innerText = 
        `La resta de ${n1} - ${n2} es: ${resultado}`;

    console.log("Resultado:", resultado);
}


/* ---------------- EJERCICIO 2 ---------------- */

function fraseUsuario() {
    let nombre = prompt("¿Cómo te llamas?");
    let ciudad = prompt("¿Dónde vives?");
    let hobby = prompt("¿Cuál es tu hobby?");

    let frase = `Te llamas ${nombre}, vives en ${ciudad}, y te gusta ${hobby}.`;

    document.getElementById("res2").innerText = frase;
}


/* ---------------- EJERCICIO 3 ---------------- */

function areaCirculo() {
    let radio = parseFloat(prompt("Introduce el radio del círculo:"));

    let pi = Math.PI.toFixed(4);
    let area = (pi * radio * radio).toFixed(2);

    let frase = 
`El área de un círculo con radio ${radio} es: ${area}
(PI usado: ${pi})`;

    document.getElementById("res3").innerText = frase;
}


/* ---------------- EJERCICIO 4 ---------------- */

function tiendaRopa() {
    // Precios fijos
    let precioCamiseta = 15;
    let precioPantalon = 30;
    let precioZapatos = 50;

    // Cantidades del usuario
    let cantCamisetas = parseInt(prompt("¿Cuántas camisetas quieres comprar?"));
    let cantPantalones = parseInt(prompt("¿Cuántos pantalones quieres comprar?"));
    let cantZapatos = parseInt(prompt("¿Cuántos zapatos quieres comprar?"));

    // Total en euros
    let total = 
        (cantCamisetas * precioCamiseta) +
        (cantPantalones * precioPantalon) +
        (cantZapatos * precioZapatos);

    // Conversión a dólares (aprox.)
    let totalDolares = (total * 1.08).toFixed(2);

    let frase =
`Total de la compra:
${cantCamisetas} camisetas → ${cantCamisetas * precioCamiseta}€
${cantPantalones} pantalones → ${cantPantalones * precioPantalon}€
${cantZapatos} zapatos → ${cantZapatos * precioZapatos}€

TOTAL: ${total}€
TOTAL en dólares: ${totalDolares}$`;

    document.getElementById("res4").innerText = frase;
}
</script>

</body>
</html>
